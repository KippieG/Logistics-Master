name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yardex_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Apply database schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d yardex_test -f database/migrations/001_init.sql
          psql -h localhost -U postgres -d yardex_test -f database/migrations/002_contact_fields.sql

      - name: Verify server starts
        working-directory: server
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: yardex_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-not-for-production
          PORT: 3001
          CLIENT_URL: http://localhost:5173
        run: |
          node src/index.js &
          sleep 3
          curl -f http://localhost:3001/api/health

  client:
    name: Client — Node.js 20.x
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
