<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arr2g" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16A34A"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#F8FAFC" rx="8"/>
  <rect width="900" height="44" fill="#1E3A5F" rx="8"/>
  <rect width="900" height="8" y="36" fill="#1E3A5F"/>
  <rect width="900" height="4" y="40" fill="#16A34A"/>
  <text x="20" y="27" fill="white" font-size="14" font-weight="bold">TO-BE PROCESS FLOW — Automated EDI Documentation Pipeline (Future State)</text>
  <text x="680" y="27" fill="#86EFAC" font-size="9">Target: Q1 2025 · −25% dwell time</text>

  <!-- Swimlane labels -->
  <rect x="10" y="58" width="90" height="68" fill="#DCFCE7" rx="4" opacity="0.7"/>
  <text x="55" y="78" fill="#166534" font-size="8" font-weight="bold" text-anchor="middle">SHIPPING</text>
  <text x="55" y="90" fill="#166534" font-size="8" font-weight="bold" text-anchor="middle">AGENT</text>
  <text x="55" y="102" fill="#166534" font-size="7" text-anchor="middle">(EDI)</text>

  <rect x="10" y="134" width="90" height="100" fill="#DBEAFE" rx="4" opacity="0.6"/>
  <text x="55" y="158" fill="#1E3A5F" font-size="8" font-weight="bold" text-anchor="middle">EDI</text>
  <text x="55" y="170" fill="#1E3A5F" font-size="8" font-weight="bold" text-anchor="middle">PLATFORM</text>

  <rect x="10" y="242" width="90" height="100" fill="#FEF3C7" rx="4" opacity="0.6"/>
  <text x="55" y="266" fill="#92400E" font-size="8" font-weight="bold" text-anchor="middle">CUSTOMS</text>
  <text x="55" y="278" fill="#92400E" font-size="8" font-weight="bold" text-anchor="middle">LIAISON</text>

  <rect x="10" y="350" width="90" height="80" fill="#FEE2E2" rx="4" opacity="0.5"/>
  <text x="55" y="374" fill="#991B1B" font-size="8" font-weight="bold" text-anchor="middle">TERMINAL</text>
  <text x="55" y="386" fill="#991B1B" font-size="8" font-weight="bold" text-anchor="middle">OPS</text>

  <line x1="10" y1="134" x2="890" y2="134" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="10" y1="242" x2="890" y2="242" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="10" y1="350" x2="890" y2="350" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- START -->
  <circle cx="140" cy="92" r="18" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <circle cx="140" cy="92" r="13" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <text x="140" y="96" fill="#166534" font-size="8" font-weight="bold" text-anchor="middle">START</text>
  <text x="140" y="122" fill="#374151" font-size="8" text-anchor="middle">Container</text>
  <text x="140" y="132" fill="#374151" font-size="8" text-anchor="middle">arrives at port</text>

  <!-- STEP 1: Agent sends via EDI -->
  <rect x="190" y="72" width="120" height="40" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" rx="5"/>
  <text x="250" y="87" fill="#166534" font-size="8.5" font-weight="bold" text-anchor="middle">Agent submits</text>
  <text x="250" y="99" fill="#166534" font-size="8" text-anchor="middle">B/L via EDI API</text>
  <text x="250" y="110" fill="#6B7280" font-size="7" text-anchor="middle">✓ Automated</text>
  <line x1="158" y1="92" x2="190" y2="92" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- STEP 2: EDI platform auto-matches -->
  <rect x="190" y="154" width="120" height="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="2" rx="5"/>
  <text x="250" y="169" fill="#1E3A5F" font-size="8.5" font-weight="bold" text-anchor="middle">EDI: Auto-match</text>
  <text x="250" y="182" fill="#6B7280" font-size="7.5" text-anchor="middle">B/L vs. manifest</text>
  <line x1="250" y1="112" x2="250" y2="154" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr2g)"/>

  <!-- Speed badge -->
  <rect x="320" y="159" width="80" height="30" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="3"/>
  <text x="360" y="172" fill="#166534" font-size="9" font-weight="bold" text-anchor="middle">⚡ &lt; 5 min</text>
  <text x="360" y="183" fill="#166534" font-size="7.5" text-anchor="middle">vs. 4.2h before</text>

  <!-- Gateway: match? -->
  <polygon points="430,174 455,154 480,174 455,194" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="455" y="171" fill="#1E3A5F" font-size="7.5" font-weight="bold" text-anchor="middle">Match</text>
  <text x="455" y="181" fill="#1E3A5F" font-size="7.5" font-weight="bold" text-anchor="middle">OK?</text>
  <line x1="310" y1="174" x2="430" y2="174" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- NO: auto-reject back to agent -->
  <line x1="455" y1="154" x2="455" y2="115" stroke="#DC2626" stroke-width="1.2"/>
  <line x1="455" y1="115" x2="310" y2="115" stroke="#DC2626" stroke-width="1.2"/>
  <line x1="310" y1="115" x2="310" y2="92" stroke="#DC2626" stroke-width="1.2" marker-end="url(#arr2)"/>
  <text x="462" y="135" fill="#DC2626" font-size="8" font-weight="bold">NO</text>
  <rect x="350" y="100" width="95" height="20" fill="#FEE2E2" rx="3"/>
  <text x="397" y="114" fill="#991B1B" font-size="7.5" text-anchor="middle">Auto-reject + notify</text>

  <!-- YES: auto-notify customs -->
  <text x="488" y="170" fill="#166534" font-size="8" font-weight="bold">YES</text>

  <!-- Auto-notify customs -->
  <rect x="500" y="262" width="120" height="40" fill="#FEF3C7" stroke="#D97706" stroke-width="2" rx="5"/>
  <text x="560" y="277" fill="#92400E" font-size="8.5" font-weight="bold" text-anchor="middle">Customs auto-</text>
  <text x="560" y="290" fill="#92400E" font-size="8.5" font-weight="bold" text-anchor="middle">notified (push)</text>
  <line x1="480" y1="174" x2="560" y2="174" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="560" y1="174" x2="560" y2="262" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- Customs reviews -->
  <rect x="640" y="262" width="120" height="40" fill="#FEF3C7" stroke="#D97706" stroke-width="2" rx="5"/>
  <text x="700" y="277" fill="#92400E" font-size="8.5" font-weight="bold" text-anchor="middle">Customs reviews</text>
  <text x="700" y="290" fill="#6B7280" font-size="7.5" text-anchor="middle">(decision support)</text>
  <line x1="620" y1="282" x2="640" y2="282" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- Gateway: approve -->
  <polygon points="775,282 800,262 825,282 800,302" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="800" y="279" fill="#92400E" font-size="7.5" font-weight="bold" text-anchor="middle">Approved</text>
  <text x="800" y="289" fill="#92400E" font-size="7.5" font-weight="bold" text-anchor="middle">?</text>
  <line x1="760" y1="282" x2="775" y2="282" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- YES: auto-release terminal -->
  <text x="828" y="278" fill="#166534" font-size="8" font-weight="bold">YES</text>
  <rect x="760" y="370" width="120" height="40" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="5"/>
  <text x="820" y="385" fill="#991B1B" font-size="8.5" font-weight="bold" text-anchor="middle">Terminal ops</text>
  <text x="820" y="398" fill="#6B7280" font-size="7.5" text-anchor="middle">auto-notified (API)</text>
  <line x1="800" y1="302" x2="820" y2="302" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="820" y1="302" x2="820" y2="370" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- End event -->
  <circle cx="820" cy="460" r="18" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
  <circle cx="820" cy="460" r="13" fill="#16A34A"/>
  <text x="820" y="464" fill="white" font-size="8" font-weight="bold" text-anchor="middle">END</text>
  <line x1="820" y1="410" x2="820" y2="442" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr2g)"/>

  <!-- Benefits banner -->
  <rect x="110" y="440" width="630" height="68" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="6"/>
  <text x="425" y="458" fill="#166534" font-size="9" font-weight="bold" text-anchor="middle">✓ KEY IMPROVEMENTS IN FUTURE STATE</text>
  <text x="210" y="474" fill="#374151" font-size="8" text-anchor="middle">EDI replaces email</text>
  <text x="210" y="485" fill="#166534" font-size="8" font-weight="bold" text-anchor="middle">4.2h → &lt;5 min</text>
  <text x="375" y="474" fill="#374151" font-size="8" text-anchor="middle">Auto-matching</text>
  <text x="375" y="485" fill="#166534" font-size="8" font-weight="bold" text-anchor="middle">Zero manual checks</text>
  <text x="540" y="474" fill="#374151" font-size="8" text-anchor="middle">Push notifications</text>
  <text x="540" y="485" fill="#166534" font-size="8" font-weight="bold" text-anchor="middle">Instant customs alert</text>
  <text x="680" y="474" fill="#374151" font-size="8" text-anchor="middle">API release</text>
  <text x="680" y="485" fill="#166534" font-size="8" font-weight="bold" text-anchor="middle">Terminal real-time</text>
  <line x1="300" y1="440" x2="300" y2="460" stroke="#A7F3D0" stroke-width="0.5"/>
  <line x1="460" y1="440" x2="460" y2="460" stroke="#A7F3D0" stroke-width="0.5"/>
  <line x1="620" y1="440" x2="620" y2="460" stroke="#A7F3D0" stroke-width="0.5"/>
</svg>