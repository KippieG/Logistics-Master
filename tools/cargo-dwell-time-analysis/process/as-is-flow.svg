<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arr_red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#F8FAFC" rx="8"/>

  <!-- Title bar -->
  <rect width="900" height="44" fill="#1E3A5F" rx="8"/>
  <rect width="900" height="8" y="36" fill="#1E3A5F"/>
  <rect width="900" height="4" y="40" fill="#F97316"/>
  <text x="20" y="27" fill="white" font-size="14" font-weight="bold">AS-IS PROCESS FLOW — Container Documentation &amp; Dwell Time (Current State)</text>
  <text x="700" y="27" fill="#93C5FD" font-size="9">Port of Zeebrugge · Jan 2023</text>

  <!-- Swimlane labels -->
  <rect x="10" y="58" width="90" height="68" fill="#DBEAFE" rx="4" opacity="0.6"/>
  <text x="55" y="78" fill="#1E3A5F" font-size="8" font-weight="bold" text-anchor="middle">SHIPPING</text>
  <text x="55" y="90" fill="#1E3A5F" font-size="8" font-weight="bold" text-anchor="middle">AGENT</text>

  <rect x="10" y="134" width="90" height="100" fill="#FEF3C7" rx="4" opacity="0.6"/>
  <text x="55" y="158" fill="#92400E" font-size="8" font-weight="bold" text-anchor="middle">CUSTOMS</text>
  <text x="55" y="170" fill="#92400E" font-size="8" font-weight="bold" text-anchor="middle">LIAISON</text>

  <rect x="10" y="242" width="90" height="100" fill="#FEE2E2" rx="4" opacity="0.6"/>
  <text x="55" y="266" fill="#991B1B" font-size="8" font-weight="bold" text-anchor="middle">TERMINAL</text>
  <text x="55" y="278" fill="#991B1B" font-size="8" font-weight="bold" text-anchor="middle">OPS</text>

  <rect x="10" y="350" width="90" height="80" fill="#DCFCE7" rx="4" opacity="0.6"/>
  <text x="55" y="374" fill="#166534" font-size="8" font-weight="bold" text-anchor="middle">FINANCE</text>

  <!-- Swimlane horizontal lines -->
  <line x1="10" y1="134" x2="890" y2="134" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="10" y1="242" x2="890" y2="242" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="10" y1="350" x2="890" y2="350" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ── STEP 1: Container Arrives (Start event) -->
  <circle cx="140" cy="92" r="18" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <circle cx="140" cy="92" r="13" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <text x="140" y="96" fill="#1E3A5F" font-size="8" font-weight="bold" text-anchor="middle">START</text>
  <text x="140" y="122" fill="#374151" font-size="8" text-anchor="middle">Container</text>
  <text x="140" y="132" fill="#374151" font-size="8" text-anchor="middle">arrives at port</text>

  <!-- STEP 2: Agent sends B/L (manual, email) -->
  <rect x="190" y="72" width="110" height="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" rx="5"/>
  <text x="245" y="88" fill="#1E3A5F" font-size="8.5" font-weight="bold" text-anchor="middle">Agent sends B/L</text>
  <text x="245" y="101" fill="#6B7280" font-size="7.5" text-anchor="middle">via email (manual)</text>
  <line x1="158" y1="92" x2="190" y2="92" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- STEP 3: Customs receives B/L -->
  <rect x="190" y="154" width="110" height="40" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" rx="5"/>
  <text x="245" y="170" fill="#92400E" font-size="8.5" font-weight="bold" text-anchor="middle">Customs receives</text>
  <text x="245" y="183" fill="#6B7280" font-size="7.5" text-anchor="middle">B/L document</text>
  <!-- downward arrow - agent to customs -->
  <line x1="245" y1="112" x2="245" y2="154" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr_red)"/>
  <!-- Delay annotation -->
  <rect x="255" y="118" width="95" height="24" fill="#FEE2E2" rx="3"/>
  <text x="303" y="128" fill="#991B1B" font-size="8" font-weight="bold" text-anchor="middle">⚠ AVG DELAY: 4.2h</text>
  <text x="303" y="139" fill="#991B1B" font-size="7.5" text-anchor="middle">manual processing</text>

  <!-- STEP 4: Manual matching check -->
  <!-- Diamond gateway -->
  <polygon points="355,174 380,154 405,174 380,194" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="380" y="171" fill="#92400E" font-size="7.5" font-weight="bold" text-anchor="middle">Match</text>
  <text x="380" y="181" fill="#92400E" font-size="7.5" font-weight="bold" text-anchor="middle">OK?</text>
  <line x1="300" y1="174" x2="355" y2="174" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- NO branch - back to agent -->
  <line x1="380" y1="154" x2="380" y2="105" stroke="#DC2626" stroke-width="1.2" marker-end="url(#arr_red)"/>
  <line x1="380" y1="105" x2="300" y2="105" stroke="#DC2626" stroke-width="1.2"/>
  <line x1="300" y1="105" x2="300" y2="92" stroke="#DC2626" stroke-width="1.2"/>
  <line x1="300" y1="92" x2="300" y2="92" stroke="#DC2626" stroke-width="1.2" marker-end="url(#arr_red)"/>
  <text x="388" y="135" fill="#DC2626" font-size="8" font-weight="bold">NO</text>
  <rect x="390" y="98" width="80" height="20" fill="#FEE2E2" rx="3"/>
  <text x="430" y="112" fill="#991B1B" font-size="7.5" text-anchor="middle">Re-request docs</text>

  <!-- YES branch -->
  <text x="412" y="170" fill="#166534" font-size="8" font-weight="bold">YES</text>

  <!-- STEP 5: Pre-clearance -->
  <rect x="420" y="154" width="110" height="40" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" rx="5"/>
  <text x="475" y="170" fill="#92400E" font-size="8.5" font-weight="bold" text-anchor="middle">Pre-clearance</text>
  <text x="475" y="183" fill="#6B7280" font-size="7.5" text-anchor="middle">review (manual)</text>
  <line x1="405" y1="174" x2="420" y2="174" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- STEP 6: Customs decision gateway -->
  <polygon points="555,174 580,154 605,174 580,194" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="580" y="171" fill="#92400E" font-size="7.5" font-weight="bold" text-anchor="middle">Approved</text>
  <text x="580" y="181" fill="#92400E" font-size="7.5" font-weight="bold" text-anchor="middle">?</text>
  <line x1="530" y1="174" x2="555" y2="174" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Approved - YES down to terminal ops -->
  <text x="608" y="170" fill="#166534" font-size="8" font-weight="bold">YES</text>

  <!-- STEP 7: Terminal release -->
  <rect x="620" y="262" width="110" height="40" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" rx="5"/>
  <text x="675" y="278" fill="#991B1B" font-size="8.5" font-weight="bold" text-anchor="middle">Terminal ops</text>
  <text x="675" y="291" fill="#6B7280" font-size="7.5" text-anchor="middle">notified (email)</text>
  <!-- connect gateway to terminal -->
  <line x1="605" y1="174" x2="675" y2="174" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="675" y1="174" x2="675" y2="262" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- STEP 8: Container released -->
  <rect x="755" y="262" width="110" height="40" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" rx="5"/>
  <text x="810" y="278" fill="#991B1B" font-size="8.5" font-weight="bold" text-anchor="middle">Container</text>
  <text x="810" y="291" fill="#6B7280" font-size="7.5" text-anchor="middle">released for pickup</text>
  <line x1="730" y1="282" x2="755" y2="282" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- STEP 9: Demurrage calc -->
  <rect x="620" y="370" width="110" height="40" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5" rx="5"/>
  <text x="675" y="386" fill="#166534" font-size="8.5" font-weight="bold" text-anchor="middle">Demurrage</text>
  <text x="675" y="399" fill="#6B7280" font-size="7.5" text-anchor="middle">calculated (manual)</text>
  <line x1="675" y1="302" x2="675" y2="370" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- End event -->
  <circle cx="840" cy="390" r="18" fill="#FEE2E2" stroke="#DC2626" stroke-width="3"/>
  <circle cx="840" cy="390" r="13" fill="#DC2626"/>
  <text x="840" y="394" fill="white" font-size="8" font-weight="bold" text-anchor="middle">END</text>
  <line x1="810" y1="282" x2="840" y2="282" stroke="#6B7280" stroke-width="1.2"/>
  <line x1="840" y1="282" x2="840" y2="372" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="730" y1="390" x2="822" y2="390" stroke="#6B7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Pain point callouts -->
  <rect x="110" y="440" width="660" height="68" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="6"/>
  <text x="440" y="458" fill="#991B1B" font-size="9" font-weight="bold" text-anchor="middle">⚠ KEY PAIN POINTS IN CURRENT STATE</text>
  <text x="200" y="474" fill="#374151" font-size="8" text-anchor="middle">Manual B/L email</text>
  <text x="200" y="485" fill="#374151" font-size="8" text-anchor="middle">= avg. 4.2h delay</text>
  <text x="380" y="474" fill="#374151" font-size="8" text-anchor="middle">No automated alerts</text>
  <text x="380" y="485" fill="#374151" font-size="8" text-anchor="middle">= reactive handling</text>
  <text x="560" y="474" fill="#374151" font-size="8" text-anchor="middle">Manual matching</text>
  <text x="560" y="485" fill="#374151" font-size="8" text-anchor="middle">= frequent re-requests</text>
  <text x="720" y="474" fill="#374151" font-size="8" text-anchor="middle">Email-based release</text>
  <text x="720" y="485" fill="#374151" font-size="8" text-anchor="middle">= terminal delays</text>
  <line x1="200" y1="440" x2="200" y2="460" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="380" y1="440" x2="380" y2="460" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="560" y1="440" x2="560" y2="460" stroke="#D1D5DB" stroke-width="0.5"/>
</svg>